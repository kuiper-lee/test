<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Fireworks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .text {
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: pulse 2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.05); opacity: 1; }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="text-container">
        <div class="text">I love you</div>
    </div>
    <canvas id="fireworksCanvas"></canvas>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworks = [];
        let hue = 120;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function calculateDistance(p1x, p1y, p2x, p2y) {
            const xDistance = p1x - p2x;
            const yDistance = p1y - p2y;
            return Math.sqrt(Math.pow(xDistance, 2) + Math.pow(yDistance, 2));
        }

        class Particle {
            constructor(x, y, hue, friction, gravity) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.radius = random(1, 3);
                this.color = `hsl(${hue}, 100%, 50%)`;
                this.velocity = {
                    x: random(-5, 5),
                    y: random(-15, 15)
                };
                this.friction = friction;
                this.gravity = gravity;
                this.timeToLive = 80;
                this.opacity = 1;
                this.active = true;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y + this.gravity;
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.timeToLive--;
                this.opacity = this.timeToLive / 80;

                if (this.timeToLive <= 0) {
                    this.active = false;
                }
            }
        }

        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.distanceToTarget = calculateDistance(sx, sy, tx, ty);
                this.distanceTraveled = 0;
                this.velocity = {
                    x: (tx - sx) * 0.01,
                    y: (ty - sy) * 0.01
                };
                this.acceleration = 1.05;
                this.brightness = random(50, 80);
                this.hue = hue;
                this.targetRadius = 1;
                this.active = true;
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.sx, this.sy);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsl(${this.hue}, 100%, ${this.brightness}%)`;
                ctx.stroke();
            }

            update() {
                this.velocity.x *= this.acceleration;
                this.velocity.y *= this.acceleration;

                const vx = this.x + this.velocity.x;
                const vy = this.y + this.velocity.y;
                this.distanceTraveled = calculateDistance(this.sx, this.sy, vx, vy);

                if (this.distanceTraveled >= this.distanceToTarget) {
                    this.createParticles();
                    this.active = false;
                } else {
                    this.x = vx;
                    this.y = vy;
                }
            }

            createParticles() {
                for (let i = 0; i < 100; i++) {
                    particles.push(new Particle(
                        this.tx,
                        this.ty,
                        this.hue,
                        0.95,
                        0.2
                    ));
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.active) {
                    particle.draw();
                    particle.update();
                } else {
                    particles.splice(index, 1);
                }
            });

            fireworks.forEach((firework, index) => {
                if (firework.active) {
                    firework.draw();
                    firework.update();
                } else {
                    fireworks.splice(index, 1);
                }
            });

            if (Math.random() < 0.05) {
                fireworks.push(new Firework(
                    canvas.width / 2,
                    canvas.height,
                    random(50, canvas.width - 50),
                    random(50, canvas.height / 2)
                ));
                hue = (hue + random(0, 360)) % 360;
            }
        }

        function createFirework(x, y) {
            fireworks.push(new Firework(
                canvas.width / 2,
                canvas.height,
                x,
                y
            ));
            hue = (hue + random(0, 360)) % 360;
        }

        canvas.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFirework(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFirework(touch.clientX, touch.clientY);
        });

        animate();
    </script>
</body>
</html>
